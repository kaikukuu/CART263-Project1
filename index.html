<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CART 263 - Solar System Collaboration</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
            color: white;
        }
    </style>
    <!-- Import Maps -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="universe.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="scene-title">I Don't Remember Grandma</div>
    <div id="scene-subtitle">Grandma's Room From Memory</div>

    <!-- Add Now Playing box at top right corner -->
    <div id="now-playing-box">
        <img id="vinyl-icon" src="src/icons/vinyl.png" alt="Record Player">
        <div id="now-playing-text">
            <span class="now-playing-label">Now Playing</span>
            <span class="now-playing-track">No track selected</span>
        </div>
    </div>

    <div id="incoming-call-box" aria-hidden="true">Incoming Call...</div>

    <div id="openbook-box" aria-hidden="true">
        <img id="openbook-icon" src="src/icons/p1p.png" alt="Open Book">
    </div>

    <div id="camera-photo-box" aria-hidden="true">
        <img id="camera-photo-image" src="src/photos/p1.png" alt="Captured photo">
    </div>

    <div id="conch-video-box" aria-hidden="true">
        <video id="conch-video" src="src/video/waves.mp4" playsinline loop muted preload="auto"></video>
        <img id="conch-video-icon" src="src/icons/conch.png" alt="Conch shell">
    </div>

</body>

</html>
